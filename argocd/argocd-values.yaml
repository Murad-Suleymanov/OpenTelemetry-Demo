# ArgoCD Helm Chart custom values
# Chart: argo/argo-cd
# Optimized for: 1 master + 2 worker node cluster

global:
  domain: argocd.local

# -- Server configuration
server:
  replicas: 1
  service:
    type: NodePort
    nodePortHttps: 30443

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  extraArgs:
    - --insecure  # Terminate TLS at LB/ingress level if needed

# -- Repo Server
repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Application Controller
controller:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -- Redis (used by ArgoCD for caching)
redis:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- ApplicationSet Controller
applicationSet:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- Notifications Controller
notifications:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -- Dex (SSO) - disabled for simplicity
dex:
  enabled: false

configs:
  params:
    server.insecure: true
  cm:
    timeout.reconciliation: 180s
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs
