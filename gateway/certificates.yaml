metadata:
  name: grafana-tls
  namespace: otel-demo
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - grafana-oteldemo.easysolution.work
---
