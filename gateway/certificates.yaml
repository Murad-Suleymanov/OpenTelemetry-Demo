apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@easysolution.work
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: otel-demo-gateway
                namespace: otel-demo
                kind: Gateway
                sectionName: http
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: oteldemo-tls
  namespace: otel-demo
spec:
  secretName: oteldemo-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - oteldemo.easysolution.work
---
apiVersion: cert-manager.io/v1
