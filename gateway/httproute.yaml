apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oteldemo-route
  namespace: otel-demo
spec:
  parentRefs:
    - name: otel-demo-gateway
  hostnames:
    - oteldemo.easysolution.work
  rules:
    - backendRefs:
        - name: frontend-proxy
          port: 8080
---
