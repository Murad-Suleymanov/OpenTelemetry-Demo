apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: otel-demo-route
  namespace: otel-demo
spec:
  parentRefs:
    - name: otel-demo-gateway
      namespace: otel-demo
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-proxy
          port: 8080
