  valkey-cart:
    enabled: true
    useDefault:
      env: false
    imageOverride:
      repository: "valkey/valkey"
      tag: "9.0.1-alpine3.23"
    replicas: 1
    ports:
      - name: valkey-cart
        value: 6379
    podAnnotations:
      resource.opentelemetry.io/service.namespace: otel-demo
